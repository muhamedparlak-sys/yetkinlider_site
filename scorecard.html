<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yetkinlik Kartı — YetkinLider</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --s1:#161b22;
  --s2:#21262d;
  --border:rgba(255,255,255,.08);
  --text:#e6edf3;
  --muted:#7d8590;
  --dim:#484f58;
  --capm:#c9960c;
  --pmp:#3b82f6;
  --adv:#a855f7;
  --topbar-h:48px;
}
body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.4}
a{color:inherit;text-decoration:none}
button{border:none;cursor:pointer;font-family:inherit}

/* TOPBAR */
#topbar{
  position:sticky;top:0;height:var(--topbar-h);
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 20px;z-index:100
}
  .brand-logo { width: 26px; height: 26px; border-radius: 5px; flex-shrink: 0; filter: brightness(0) invert(1); }
  .brand{font-weight:700;font-size:14px}
.t-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.t-title{font-size:12px;color:var(--muted)}
.btn-back{
  margin-left:auto;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:12px;border-radius:6px;
  padding:5px 13px;transition:border-color .15s,color .15s
}
.btn-back:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

/* PAGE */
.page{max-width:1040px;margin:0 auto;padding:20px 16px 64px}

/* PROFILE CARD */
.profile-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:20px 24px;
  display:flex;align-items:flex-start;gap:18px;
  margin-bottom:10px;
}
.pav{
  width:52px;height:52px;border-radius:50%;
  background:var(--s2);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:rgba(255,255,255,.55);
  flex-shrink:0;position:relative;overflow:hidden;cursor:pointer;
}
.pav-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.pav-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.pav:hover .pav-overlay{opacity:1}
.pinfo{flex:1;min-width:0}
.pname{font-size:18px;font-weight:700}
.psub{font-size:11px;color:var(--muted);margin-top:3px}
.pmeta{display:flex;gap:24px;margin-top:14px;flex-wrap:wrap}
.pmeta-item{display:flex;flex-direction:column;gap:3px}
.pmeta-val{font-size:14px;font-weight:700}
.pmeta-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.c-gold{color:#c9960c}
.pright{text-align:right;flex-shrink:0}
.plevel-num{font-size:38px;font-weight:800;color:#c9960c;line-height:1;font-variant-numeric:tabular-nums}
.plevel-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-top:4px}
.plevel-title{font-size:11px;color:#c9960c;margin-top:3px}

/* TAB ROW */
.tab-row{
  display:flex;gap:6px;margin-bottom:10px;
}
.tab-btn{
  flex:1;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;text-align:center;
  transition:border-color .15s,background .15s;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tab-btn:hover{border-color:rgba(255,255,255,.15)}
.tab-cert{font-size:12px;font-weight:700;color:var(--muted);transition:color .15s}
.tab-sub{font-size:10px;color:var(--dim)}
.tab-btn[data-tab="capm"].active{border-color:var(--capm);background:rgba(201,150,12,.06)}
.tab-btn[data-tab="capm"].active .tab-cert{color:var(--capm)}
.tab-btn[data-tab="pmp"].active{border-color:var(--pmp);background:rgba(59,130,246,.06)}
.tab-btn[data-tab="pmp"].active .tab-cert{color:var(--pmp)}
.tab-btn[data-tab="adv"].active{border-color:var(--adv);background:rgba(168,85,247,.06)}
.tab-btn[data-tab="adv"].active .tab-cert{color:var(--adv)}

/* MAIN LAYOUT */
.main-grid{display:grid;grid-template-columns:1fr 256px;gap:10px;align-items:start}

/* ATTRIBUTE PANEL — FM style */
.attr-panel{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.area-block{border-bottom:1px solid var(--border)}
.area-block:last-child{border-bottom:none}
.area-head{
  padding:8px 16px;
  background:var(--s2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.area-head-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.area-head-weight{font-size:10px;color:var(--dim)}

.skill-pair{display:flex;border-bottom:1px solid rgba(255,255,255,.04)}
.skill-pair:last-child{border-bottom:none}
.skill-cell{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;min-width:0;
}
.skill-cell+.skill-cell{border-left:1px solid rgba(255,255,255,.04)}
.skill-cell.sk-solo{max-width:50%}
.skill-label{
  font-size:12px;color:rgba(255,255,255,.58);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  padding-right:8px;flex:1;min-width:0;
}
.skill-old{font-size:10px;color:var(--dim);font-weight:400}
.skill-num{
  font-size:15px;font-weight:700;
  font-variant-numeric:tabular-nums;
  flex-shrink:0;min-width:24px;text-align:right;
}

/* Stat colors */
.sv-none      {color:var(--dim)}
.sv-weak      {color:#cf4444}
.sv-developing{color:#d97a1e}
.sv-competent {color:#c9960c}
.sv-proficient{color:#7cba8a}
.sv-expert    {color:#27a357}

/* Level badge on tab */
.tab-level-desc{
  font-size:10px;color:var(--dim);font-style:italic;
  padding:6px 16px 8px;border-top:1px solid rgba(255,255,255,.04);
  line-height:1.5;
}

/* RIGHT PANEL */
.right-panel{display:flex;flex-direction:column;gap:10px}
.info-panel{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-head{
  padding:8px 14px;
  background:var(--s2);border-bottom:1px solid var(--border);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)
}
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;
}
.info-row:last-child{border-bottom:none}
.ir-label{color:var(--muted)}
.ir-val{font-weight:600;font-variant-numeric:tabular-nums;color:var(--text)}
.ir-gold{color:#c9960c}
.ir-green{color:#27a357}
.ir-blue{color:#3b82f6}
.ir-purple{color:#a855f7}

.eco-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;
}
.eco-row:last-child{border-bottom:none}
.eco-name{color:var(--muted)}
.eco-val{font-weight:600;font-variant-numeric:tabular-nums}

.dev-item{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.dev-item:last-child{border-bottom:none}
.dev-name{font-size:13px;color:rgba(255,255,255,.5)}
.dev-stat{font-size:11px;color:#cf4444;margin-top:2px}

.btn-reset{
  width:100%;background:transparent;
  border:1px solid var(--border);
  color:var(--dim);font-size:12px;padding:9px;
  border-radius:8px;transition:border-color .15s,color .15s;
}
.btn-reset:hover{border-color:rgba(207,68,68,.4);color:#cf4444}

.empty-note{
  background:var(--s1);border:1px solid var(--border);border-radius:8px;
  padding:36px 20px;text-align:center;
}
.empty-note h3{font-size:14px;font-weight:600;color:rgba(255,255,255,.35);margin-bottom:6px}
.empty-note p{font-size:12px;color:var(--dim);line-height:1.7}
.btn-play{
  display:inline-block;margin-top:14px;
  background:#142040;border:1px solid #2355a0;
  color:#93c5fd;font-size:13px;font-weight:600;
  padding:9px 22px;border-radius:6px;transition:background .15s
}
.btn-play:hover{background:#1a2f5a}

.loading-note{
  background:var(--s1);border:1px solid var(--border);border-radius:8px;
  padding:24px 20px;text-align:center;color:var(--muted);font-size:13px;
}

@media(max-width:680px){
  .main-grid{grid-template-columns:1fr}
  .skill-cell.sk-solo{max-width:100%}
  .skill-pair{flex-direction:column}
  .skill-cell+.skill-cell{border-left:none;border-top:1px solid rgba(255,255,255,.04)}
  .profile-card{flex-wrap:wrap}
  .pright{width:100%;text-align:left;margin-top:4px;display:flex;align-items:baseline;gap:10px}
  .plevel-num{font-size:28px}
  .tab-row{flex-wrap:wrap}
}
</style>
</head>

<script>

      { id: 'maliyet',     label: 'Maliyet / Finans',       oldLabel: 'EVM',
        desc: { capm: 'Bütçelemenin amacını ve önemini açıklar.',
                pmp:  'Proje bütçesini planlar ve yönetir, harcamaları takip eder.',
                adv:  'Finansal rezervleri yönetir, zorlukları öngörür, yönetişimle çalışır.' } },

        desc: { capm: 'Dış faktörlerin kapsam üzerindeki etkisini fark eder.',

    ]

/* Old star-top-bank competency id → new id mapping */
const OLD_TO_NEW = {
  value:  'fayda_deger',
  agile:  'kapsam',
  ethics: 'uyumluluk',
  comms:  'catisma',
  tech:   'entegrasyon',
};

const DIFF_WEIGHT = { beginner:1, intermediate:3, advanced:5 };
const TAB_DIFF    = { capm:1, pmp:3, adv:5 };
const TAB_LABEL   = { capm:'capm', pmp:'pmp', adv:'adv' };

const SESSION_KEY = 'pmSim_session';
const PHOTO_KEY   = 'pmSim_profile_photo';

/* ── helpers ─────────────────────────────────────────────────── */
function statClass(s) {
  if (s >= 17) return 'sv-expert';
  if (s >= 13) return 'sv-proficient';
  if (s >= 8)  return 'sv-competent';
  if (s >= 4)  return 'sv-developing';
  if (s >= 1)  return 'sv-weak';
  return 'sv-none';
}

function careerLevel(xp) {
  if (xp >= 120) return { n:5, t:'Kıdemli PM' };
  if (xp >= 80)  return { n:4, t:'PM Lideri' };
  if (xp >= 50)  return { n:3, t:'Proje Yöneticisi' };
  if (xp >= 20)  return { n:2, t:'Junior PM' };
  return { n:1, t:'PM Stajyeri' };
}

function getDiffWeight(difficulty) {
  return DIFF_WEIGHT[(difficulty||'').toLowerCase()] || 3;
}

/* ── data loading ─────────────────────────────────────────────── */
async function loadManifest() {
  try { const r = await fetch('data/scenarios/manifest.json'); return r.ok ? await r.json() : null; }
  catch { return null; }
}

async function loadScenario(id) {
  try { const r = await fetch(`data/scenarios/${id}.json`); return r.ok ? await r.json() : null; }
  catch { return null; }
}

/* ── extract user saves from localStorage ────────────────────── */
function getUserSaves(username) {
  const prefix = `pmSim_save_${username}_`;
  const saves = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith(prefix)) continue;
    try {
      const d = JSON.parse(localStorage.getItem(key));
      if (d) saves.push({ ...d, scenarioId: key.slice(prefix.length) });
    } catch {}
  }
  return saves;
}

/* ── build decision → max XP map + decision → competency map for a scenario ── */
function buildScenarioMaps(scenario) {
  const decisionMap = {};  // id → options[]
  for (const n of (scenario.notifications || [])) {
    if (n.type === 'decision') decisionMap[n.id] = n.options || [];
  }

  const decToComp = {};  // decisionId → competency id (new)
  const comps = scenario.competencies || [];

  if (comps.length > 0 && comps[0].components) {
    // New ebabil-style: [{id,domain,components:[{id,decisionIds}]}]
    for (const area of comps) {
      for (const comp of (area.components || [])) {
        for (const did of (comp.decisionIds || [])) {
          decToComp[did] = comp.id;
        }
      }
    }
  } else {
    // Old star-top-bank-style: [{id,decisionIds}]
    for (const comp of comps) {
      const newId = OLD_TO_NEW[comp.id];
      if (!newId) continue;
      for (const did of (comp.decisionIds || [])) {
        decToComp[did] = newId;
      }
    }
  }

  return { decisionMap, decToComp };
}

/* ── compute competency stats for a given difficulty ─────────── */
function computeStats(saves, scenariosData, diffWeight) {
  // earned[compId] = {earned, max}
  const earned = {};
  for (const area of AREAS)
    for (const sk of area.skills)
      earned[sk.id] = { e: 0, m: 0 };

  for (const save of saves) {
    const w = save.difficultyWeight || 3;
    if (w !== diffWeight) continue;

    const scenario = scenariosData[save.scenarioId];
    if (!scenario) continue;

    const { decisionMap, decToComp } = buildScenarioMaps(scenario);
    const answered = save.answered || {};

    for (const [didStr, optKey] of Object.entries(answered)) {
      if (optKey === 'READ') continue;
      const did = parseInt(didStr, 10);
      const compId = decToComp[did];
      if (!compId || !earned[compId]) continue;

      const options = decisionMap[did] || [];
      const maxXP   = Math.max(0, ...options.map(o => o.xp || 0));
      earned[compId].m += maxXP;

      const chosen = options.find(o => o.key === optKey);
      earned[compId].e += Math.max(0, chosen?.xp || 0);
    }
  }

  // Convert to 0-20 stat
  const stats = {};
  for (const [id, v] of Object.entries(earned)) {
    stats[id] = v.m > 0 ? Math.min(20, Math.round((v.e / v.m) * 20)) : 0;
  }
  return stats;
}

/* ── profile stats (all difficulties combined) ───────────────── */
function computeProfile(saves, scenariosData) {
  let totalXP = 0, totalDec = 0, goodDec = 0, scenarios = 0;

  for (const save of saves) {
    totalXP += save.xp || 0;
    const scenario = scenariosData[save.scenarioId];
    const decisionMap = scenario ? buildScenarioMaps(scenario).decisionMap : {};

    const answered = save.answered || {};
    const answeredDecs = Object.entries(answered).filter(([,v]) => v !== 'READ');
    totalDec += answeredDecs.length;

    for (const [didStr, optKey] of answeredDecs) {
      const did = parseInt(didStr, 10);
      const options = decisionMap[did] || [];
      const chosen = options.find(o => o.key === optKey);
      if (chosen && (chosen.xp || 0) > 0) goodDec++;
    }

    // Completed = answered all decisions in scenario
    const allDecIds = Object.keys(decisionMap).map(Number);
    if (allDecIds.length > 0 && allDecIds.every(id => answered[id] && answered[id] !== 'READ')) {
      scenarios++;
    }
  }

  return { totalXP, totalDec, goodDec, scenarios };
}

/* ── determine default tab ───────────────────────────────────── */
function defaultTab(saves) {
  const weights = new Set(saves.map(s => s.difficultyWeight || 3));
  if (weights.has(5)) return 'adv';
  if (weights.has(3)) return 'pmp';
  return 'capm';
}

/* ── has any data for tab ───────────────────────────────────── */
function hasDataForTab(saves, tab) {
  const w = TAB_DIFF[tab];
  return saves.some(s => (s.difficultyWeight || 3) === w);
}

/* ── avatar ──────────────────────────────────────────────────── */
function handlePhotoUpload(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { localStorage.setItem(PHOTO_KEY, e.target.result); applyAvatar(e.target.result, null); };
  reader.readAsDataURL(file);
}
function applyAvatar(photoUrl, fallback) {
  const av = document.getElementById('sc-av');
  const letter = document.getElementById('sc-av-letter');
  let img = av.querySelector('.pav-img');
  if (photoUrl) {
    if (!img) { img = document.createElement('img'); img.className='pav-img'; av.insertBefore(img, av.firstChild); }
    img.src = photoUrl;
    if (letter) letter.style.visibility = 'hidden';
  } else {
    if (img) img.remove();
    if (letter) { letter.style.visibility = ''; if (fallback) letter.textContent = fallback; }
  }
}

/* ── render attribute panel ──────────────────────────────────── */
function renderAttr(stats, tab) {
  let html = '<div class="attr-panel">';
  for (const area of AREAS) {
    html += `<div class="area-block">
      <div class="area-head">
        <span class="area-head-name">${area.label}</span>
        <span class="area-head-weight">%${area.weight} ECO</span>
      </div>`;
    const skills = area.skills;
    for (let i = 0; i < skills.length; i += 2) {
      const s1 = skills[i], s2 = skills[i+1];
      const st1 = stats[s1.id] || 0;
      const lbl1 = s1.oldLabel ? `${s1.label} <span class="skill-old">(${s1.oldLabel})</span>` : s1.label;
      const tip1 = s1.desc[tab] || '';

      html += `<div class="skill-pair">
        <div class="skill-cell${!s2?' sk-solo':''}" title="${tip1}">
          <span class="skill-label">${lbl1}</span>
          <span class="skill-num ${statClass(st1)}">${st1 || '—'}</span>
        </div>`;

      if (s2) {
        const st2 = stats[s2.id] || 0;
        const lbl2 = s2.oldLabel ? `${s2.label} <span class="skill-old">(${s2.oldLabel})</span>` : s2.label;
        const tip2 = s2.desc[tab] || '';
        html += `<div class="skill-cell" title="${tip2}">
          <span class="skill-label">${lbl2}</span>
          <span class="skill-num ${statClass(st2)}">${st2 || '—'}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* ── render right panel ──────────────────────────────────────── */
function renderRight(profile, stats, saves, tab, scenariosData) {
  const lvl = careerLevel(profile.totalXP);
  const acc = profile.totalDec > 0 ? Math.round(profile.goodDec / profile.totalDec * 100) + '%' : '—';
  const tabColor = tab==='capm'?'ir-gold':tab==='pmp'?'ir-blue':'ir-purple';
  const tabName  = tab==='capm'?'CAPM':tab==='pmp'?'PMP':'Advanced PMP';

  // ECO breakdown for this tab
  let ecoHTML = `<div class="info-panel"><div class="panel-head">ECO Alan Performansı · ${tabName}</div>`;
  for (const area of AREAS) {
    const compStats = area.skills.map(sk => stats[sk.id]||0).filter(v=>v>0);
    const avg = compStats.length > 0 ? Math.round(compStats.reduce((a,b)=>a+b,0)/compStats.length) : 0;
    const pct = Math.round((avg/20)*100);
    const col = tab==='capm'?'#c9960c':tab==='pmp'?'#3b82f6':'#a855f7';
    ecoHTML += `<div class="eco-row">
      <span class="eco-name">${area.label.split('/')[0].trim()}</span>
      <span class="eco-val" style="color:${avg>0?col:'var(--dim)'}">${avg>0?pct+'%':'—'}</span>
    </div>`;
  }
  ecoHTML += '</div>';

  // Dev needs (stat 1-4)
  const weak = [];
  for (const area of AREAS)
    for (const sk of area.skills) {
      const st = stats[sk.id]||0;
      if (st >= 1 && st < 4) weak.push({ label: sk.label, stat: st });
    }
  let devHTML = '';
  if (weak.length > 0) {
    devHTML = '<div class="info-panel"><div class="panel-head">Gelişim Alanları</div>';
    for (const sk of weak)
      devHTML += `<div class="dev-item">
        <div class="dev-name">${sk.label}</div>
        <div class="dev-stat">${sk.stat} / 20 · Temel</div>
      </div>`;
    devHTML += '</div>';
  }

  // Stats panel
  const statsHTML = `<div class="info-panel">
    <div class="panel-head">Kariyer İstatistikleri</div>
    <div class="info-row"><span class="ir-label">Toplam XP</span><span class="ir-val ir-gold">${profile.totalXP}</span></div>
    <div class="info-row"><span class="ir-label">Kariyer Seviyesi</span><span class="ir-val ir-gold">Seviye ${lvl.n} · ${lvl.t}</span></div>
    <div class="info-row"><span class="ir-label">Tamamlanan Senaryo</span><span class="ir-val">${profile.scenarios}</span></div>
    <div class="info-row"><span class="ir-label">Verilen Karar</span><span class="ir-val">${profile.totalDec}</span></div>
    <div class="info-row"><span class="ir-label">İsabetli Karar</span><span class="ir-val ir-green">${acc}</span></div>
    <div class="info-row"><span class="ir-label">Aktif Karne</span><span class="ir-val ${tabColor}">${tabName}</span></div>
  </div>`;

  const resetHTML = `<button class="btn-reset" onclick="confirmReset()">Tüm Kayıtları Sıfırla</button>`;

  return `${statsHTML}${ecoHTML}${devHTML}${resetHTML}`;
}

/* ── main render ─────────────────────────────────────────────── */
let G = { saves:[], scenariosData:{}, activeTab:'capm' };

async function init() {
  const session = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch { return null; } })();
  const name = session?.displayName || session?.username || 'PM';

  // Avatar
  applyAvatar(localStorage.getItem(PHOTO_KEY), (name[0]||'?').toUpperCase());

  // Load manifest + scenarios
  const manifest = await loadManifest();
  if (manifest) {
    const ids = manifest.scenarios.map(s => s.id);
    const loaded = await Promise.all(ids.map(id => loadScenario(id)));
    ids.forEach((id,i) => { if (loaded[i]) G.scenariosData[id] = loaded[i]; });
  }

  // Load saves
  if (session?.username) {
    G.saves = getUserSaves(session.username);
  }

  // Profile
  const profile = computeProfile(G.saves, G.scenariosData);

  // Header
  document.getElementById('sc-name').textContent      = name;
  document.getElementById('sc-sub').textContent       = 'PM Kariyer Yolculuğu';
  document.getElementById('sc-scenarios').textContent = profile.scenarios;
  document.getElementById('sc-decisions').textContent = profile.totalDec;
  document.getElementById('sc-xp').textContent        = profile.totalXP + ' XP';
  const acc = profile.totalDec > 0 ? Math.round(profile.goodDec/profile.totalDec*100)+'%' : '—';
  document.getElementById('sc-accuracy').textContent  = acc;
  const lvl = careerLevel(profile.totalXP);
  document.getElementById('sc-level').textContent       = lvl.n;
  document.getElementById('sc-level-title').textContent = lvl.t;

  // Default tab
  G.activeTab = defaultTab(G.saves);
  G.profile   = profile;

  setupTabs();
  renderTab(G.activeTab);
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const tab = btn.dataset.tab;
    if (!hasDataForTab(G.saves, tab)) {
      btn.style.opacity = '0.5';
      const sub = btn.querySelector('.tab-sub');
      if (sub) sub.textContent = 'Veri yok · ' + sub.textContent.split('·')[1]?.trim();
    }
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      G.activeTab = tab;
      renderTab(tab);
    });
  });
  // Set active
  document.querySelector(`.tab-btn[data-tab="${G.activeTab}"]`)?.classList.add('active');
}

function renderTab(tab) {
  const diffWeight = TAB_DIFF[tab];
  const stats = computeStats(G.saves, G.scenariosData, diffWeight);
  const hasData = hasDataForTab(G.saves, tab);
  const tabKey  = TAB_LABEL[tab];

  const attrHTML  = renderAttr(stats, tabKey);
  const rightHTML = renderRight(G.profile, stats, G.saves, tab, G.scenariosData);

  const emptyHTML = !hasData ? `<div class="empty-note">
    <h3>Bu seviyede veri yok</h3>
    <p>${tab==='capm'?'Kolay':tab==='pmp'?'Normal':'Zor'} zorluktaki senaryoyu simüle ederek bu karneyi doldur.</p>
    <a href="game.html" class="btn-play">Simülasyonu Başlat</a>
  </div>` : '';

  document.getElementById('main-grid').innerHTML = `
    <div>${attrHTML}${emptyHTML}</div>
    <div class="right-panel">${rightHTML}</div>`;
}

function confirmReset() {
  if (!confirm('Tüm kariyer istatistiklerini sıfırlamak istediğinden emin misin?\n\nBu işlem geri alınamaz.')) return;
  const session = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch { return null; } })();
  if (session?.username) {
    const prefix = `pmSim_save_${session.username}_`;
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k?.startsWith(prefix)) keys.push(k);
    }
    keys.forEach(k => localStorage.removeItem(k));
  }
  localStorage.removeItem('pmp_career_competency');
  location.reload();
}

document.addEventListener('DOMContentLoaded', init);
</script>
