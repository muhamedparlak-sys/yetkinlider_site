<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<link rel="icon" href="favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profilim — YetkinLider</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>if(localStorage.getItem('pmSim_theme')==='dark')document.documentElement.classList.add('dark');</script>
<style>
:root {
  --primary: #2f4f60;
  --primary-dark: #1f3b49;
  --primary-light: #5f93c2;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --text: #0b1220;
  --text-secondary: #334155;
  --text-muted: #64748b;
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --border: #e2e8f0;
  --radius: 10px;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, system-ui, sans-serif; color: var(--text); background: var(--bg); }

/* ── NAV ── */
.navbar { background: var(--primary); height: 52px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 6px rgba(0,0,0,.18); }
.brand-logo { width: 26px; height: 26px; border-radius: 5px; flex-shrink: 0; filter: brightness(0) invert(1); }
.brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 15px; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.brand sup { font-size: 9px; vertical-align: super; }
.nav-spacer { flex: 1; }
.nav-user { display: flex; align-items: center; gap: 8px; margin-right: 10px; }
.nav-av { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; overflow: hidden; flex-shrink: 0; }
.nav-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.nav-username { color: rgba(255,255,255,.9); font-size: 13px; font-weight: 600; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hamburger { display: flex; flex-direction: column; justify-content: center; gap: 5px; background: transparent; border: 1px solid rgba(255,255,255,.25); border-radius: 7px; cursor: pointer; padding: 7px 8px; flex-shrink: 0; transition: border-color .15s; }
.hamburger:hover { border-color: rgba(255,255,255,.45); }
.hamburger span { display: block; width: 18px; height: 2px; background: #fff; border-radius: 2px; transition: all .2s; }
.hamburger[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger[aria-expanded="true"] span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.menu-panel { position: fixed; top: 52px; left: 0; right: 0; background: var(--primary-dark); z-index: 999; max-height: 0; overflow: hidden; transition: max-height .28s ease; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.menu-panel.open { max-height: 600px; }
.menu-inner { padding: 8px 0 12px; }
.menu-item { display: flex; align-items: center; gap: 12px; padding: 11px 22px; color: rgba(255,255,255,.82); font-size: 14px; font-weight: 500; text-decoration: none; transition: background .14s, color .14s; }
.menu-item:hover, .menu-item.active { background: rgba(255,255,255,.08); color: #fff; }
.menu-item.primary { color: #7dd3fc; font-weight: 600; }
.menu-item.primary:hover { color: #fff; }
.menu-icon { width: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: .75; }
.menu-div { height: 1px; background: rgba(255,255,255,.1); margin: 8px 16px; }
.menu-auth-area { padding: 4px 0; }
.menu-auth-row { display: flex; align-items: center; gap: 10px; padding: 10px 22px; }
.menu-auth-name { color: rgba(255,255,255,.85); font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-menu-logout { background: none; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.6); font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .14s; }
.btn-menu-logout:hover { border-color: rgba(255,255,255,.5); color: #fff; }
.btn-menu-login { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.8); font-size: 13px; font-weight: 500; text-decoration: none; padding: 6px 0; }
.btn-menu-login:hover { color: #fff; }

/* ── PAGE ── */
.page-wrap { max-width: 700px; margin: 0 auto; padding: 36px 20px 60px; }

/* ── PROFILE HERO ── */
.profile-hero { display: flex; align-items: center; gap: 22px; margin-bottom: 32px; }
.profile-av-wrap { position: relative; flex-shrink: 0; }
.profile-av { width: 76px; height: 76px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; overflow: hidden; border: 3px solid var(--surface); box-shadow: 0 2px 12px rgba(59,130,246,.25); }
.profile-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.profile-av-edit { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .18s; cursor: pointer; }
.profile-av-wrap:hover .profile-av-edit { opacity: 1; }
.profile-av-edit svg { pointer-events: none; }
#photoInput { display: none; }
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
.profile-username { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.profile-email { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.profile-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.profile-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-secondary); }
.profile-badge.dev     { background: #fef3c7; border-color: #fcd34d; color: #92400e; }
.profile-badge.admin   { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
.profile-badge.editor  { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
.profile-badge.premium { background: #f5f3ff; border-color: #c4b5fd; color: #5b21b6; }
.profile-badge.trial   { background: #f0fdf4; border-color: #86efac; color: #166534; }
.profile-badge.standard{ background: var(--surface2); border-color: var(--border); color: var(--text-muted); }

/* ── TABS ── */
.profile-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.profile-tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; background: none; border-top: none; border-left: none; border-right: none; margin-bottom: -1px; }
.profile-tab:hover { color: var(--text); }
.profile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SECTION ── */
.section { margin-bottom: 28px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title svg { opacity: .7; }

/* ── DOMAIN CARDS ── */
.domain-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 540px) { .domain-grid { grid-template-columns: 1fr; } }

.domain-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color .15s, box-shadow .15s; }
.domain-card:hover { border-color: var(--primary-light); box-shadow: 0 2px 8px rgba(0,0,0,.07); }
.dc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.dc-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
.dc-icon.people  { background: #eff6ff; }
.dc-icon.process { background: #f0fdf4; }
.dc-icon.business{ background: #fdf4ff; }
.dc-name { font-size: 13px; font-weight: 700; color: var(--text); }
.dc-sub  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.dc-score { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.dc-score.no-data { color: #cbd5e1; font-size: 20px; }
.dc-score.green  { color: #059669; }
.dc-score.amber  { color: #d97706; }
.dc-score.red    { color: #dc2626; }

.dc-bar-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.dc-bar { height: 100%; border-radius: 2px; transition: width .6s ease; }
.dc-bar.green  { background: #10b981; }
.dc-bar.amber  { background: #f59e0b; }
.dc-bar.red    { background: #ef4444; }
.dc-bar.no-data{ background: #e2e8f0; width: 0 !important; }

.dc-count { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
.dc-train-btn { width: 100%; padding: 8px; background: none; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all .14s; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
.dc-train-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── LAST SCENARIO ── */
.scenario-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.scenario-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
.scenario-mode-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .05em; }
.scenario-mode-badge.career    { background: #f5f3ff; border: 1px solid #d8b4fe; color: #7c3aed; }
.scenario-mode-badge.competency{ background: #eff6ff; border: 1px solid #93c5fd; color: #1d4ed8; }
.scenario-card-title { font-size: 16px; font-weight: 700; color: var(--text); }
.scenario-rows { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; font-size: 13px; margin-bottom: 16px; }
.scenario-lbl  { color: var(--text-muted); font-weight: 500; white-space: nowrap; }
.scenario-val  { color: var(--text-secondary); font-weight: 600; }
.btn-go-tailor { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 8px; text-decoration: none; border: none; cursor: pointer; transition: background .14s; }
.btn-go-tailor:hover { background: var(--accent-dark); }
.no-scenario { color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center; }
.no-scenario a { color: var(--accent); text-decoration: none; font-weight: 600; }
.no-scenario a:hover { text-decoration: underline; }

/* ── ACCOUNT ── */
.account-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.account-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.account-row:last-child { border-bottom: none; }
.account-row-label { flex: 1; }
.account-row-label strong { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.account-row-label span  { font-size: 12px; color: var(--text-muted); }
.account-row-value { font-size: 13px; color: var(--text-secondary); font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-edit { background: none; border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all .14s; white-space: nowrap; }
.btn-edit:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: none; border: 1px solid #fca5a5; color: #dc2626; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .14s; display: flex; align-items: center; gap: 5px; }
.btn-danger:hover { background: #dc2626; border-color: #dc2626; color: #fff; }

/* ── EDIT NAME MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box { background: var(--surface); border-radius: 14px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.25); transform: translateY(10px); transition: transform .2s; }
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-input { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); transition: border-color .14s; }
.modal-input:focus { outline: none; border-color: var(--accent); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-modal-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 7px; cursor: pointer; }
.btn-modal-save   { background: var(--accent); border: none; color: #fff; font-size: 13px; font-weight: 700; padding: 8px 20px; border-radius: 7px; cursor: pointer; transition: background .14s; }
.btn-modal-save:hover { background: var(--accent-dark); }

@media (max-width: 480px) {
  .profile-hero { flex-direction: column; align-items: flex-start; gap: 14px; }
  .nav-username { display: none; }
}

/* ── THEME TOGGLE ── */
.theme-toggle { background:transparent; border:1px solid rgba(255,255,255,.25); border-radius:7px; cursor:pointer; padding:7px 8px; flex-shrink:0; color:#fff; display:flex; align-items:center; justify-content:center; transition:border-color .15s; margin-right:6px; }
.theme-toggle:hover { border-color:rgba(255,255,255,.5); }

/* ── DARK MODE ── */
html.dark { color-scheme:dark; }
html.dark body { background:#0d1117; color:#e6edf3; }
html.dark {
  --text:#e6edf3; --text-secondary:#8b949e; --text-muted:#7d8590;
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d;
  --border:rgba(255,255,255,.10);
}
html.dark .profile-career-stats { border-top-color:var(--border); }
html.dark .profile-tabs { border-color:var(--border); }
html.dark .sc-wrap { background:transparent; border-radius:0; }
html.dark .sc-wrap .tab-row { padding-left:0; padding-right:0; }
html.dark .main-grid { padding-left:0; padding-right:0; }
html.dark .scenario-card,.scenario-card-title { color:var(--text); }
html.dark .account-row { border-bottom-color:var(--border); }
html.dark .modal-box { background:var(--surface); }
html.dark .modal-input { background:var(--surface2); border-color:var(--border); color:var(--text); }
html.dark .modal-overlay { background:rgba(0,0,0,.65); }
/* badge dark variants */
html.dark .profile-badge.admin   { background:rgba(239,68,68,.15);  border-color:rgba(239,68,68,.35);  color:#fca5a5; }
html.dark .profile-badge.editor  { background:rgba(249,115,22,.15); border-color:rgba(249,115,22,.35); color:#fdba74; }
html.dark .profile-badge.premium { background:rgba(168,85,247,.15); border-color:rgba(168,85,247,.35); color:#c4b5fd; }
html.dark .profile-badge.trial   { background:rgba(16,185,129,.15); border-color:rgba(16,185,129,.35); color:#6ee7b7; }
html.dark .profile-badge.dev     { background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.35); color:#fcd34d; }

/* ── PROFILE CAREER STATS (below role badge) ── */
.profile-career-stats { display:flex; gap:18px; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.pcs-item { display:flex; flex-direction:column; gap:2px; }
.pcs-val { font-size:14px; font-weight:700; color:var(--text); }
.pcs-val.gold { color:#c9960c; }
.pcs-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); }

/* ── SCORECARD DARK SECTION ── */
:root { --capm:#c9960c; --pmp:#3b82f6; --adv:#a855f7; }
.sc-wrap {
  --s1:#161b22; --s2:#21262d; --muted:#a0aec0; --dim:#8b949e;
  --text:#e6edf3; --border:rgba(255,255,255,.10);
  background:#0d1117; border-radius:10px; color:#e6edf3; overflow:hidden;
}
.sc-wrap .tab-row { display:flex; gap:6px; padding:12px 12px 0; }
.tab-btn { flex:1; background:var(--s1); border:1px solid var(--border); border-radius:8px; padding:10px 14px; text-align:center; transition:border-color .15s,background .15s; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; font-family:inherit; }
.tab-btn:hover { border-color:rgba(255,255,255,.15); }
.tab-cert { font-size:12px; font-weight:700; color:rgba(255,255,255,.78); transition:color .15s; }
.tab-sub { font-size:10px; color:var(--muted); }
.tab-btn[data-tab="capm"].active { border-color:var(--capm); background:rgba(201,150,12,.06); }
.tab-btn[data-tab="capm"].active .tab-cert { color:var(--capm); }
.tab-btn[data-tab="pmp"].active { border-color:var(--pmp); background:rgba(59,130,246,.06); }
.tab-btn[data-tab="pmp"].active .tab-cert { color:var(--pmp); }
.tab-btn[data-tab="adv"].active { border-color:var(--adv); background:rgba(168,85,247,.06); }
.tab-btn[data-tab="adv"].active .tab-cert { color:var(--adv); }
.main-grid { display:grid; grid-template-columns:1fr 256px; gap:10px; align-items:start; padding:10px 12px 12px; }
.attr-panel { background:var(--s1); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.area-block { border-bottom:1px solid var(--border); }
.area-block:last-child { border-bottom:none; }
.area-head { padding:8px 16px; background:var(--s2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.area-head-name { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }
.area-head-weight { font-size:10px; color:var(--dim); }
.risk-section-divider { grid-column:1/-1; margin:20px 0 8px; display:flex; align-items:center; gap:10px; }
.risk-section-divider span { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:#a78bfa; white-space:nowrap; }
.risk-section-divider::before,.risk-section-divider::after { content:''; flex:1; height:1px; background:rgba(167,139,250,.2); }
.skill-pair { display:flex; border-bottom:1px solid rgba(255,255,255,.04); }
.skill-pair:last-child { border-bottom:none; }
.skill-cell { flex:1; display:flex; align-items:center; justify-content:space-between; padding:9px 16px; min-width:0; }
.skill-cell+.skill-cell { border-left:1px solid rgba(255,255,255,.04); }
.skill-cell.sk-solo { max-width:50%; }
.skill-label { font-size:12px; color:rgba(255,255,255,.82); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px; flex:1; min-width:0; }
.skill-old { font-size:10px; color:var(--dim); font-weight:400; }
.skill-num { font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; flex-shrink:0; min-width:24px; text-align:right; }
.sv-none { color:var(--dim); } .sv-weak { color:#cf4444; } .sv-developing { color:#d97a1e; }
.sv-competent { color:#c9960c; } .sv-proficient { color:#7cba8a; } .sv-expert { color:#27a357; }
.right-panel { display:flex; flex-direction:column; gap:10px; }
.info-panel { background:var(--s1); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.panel-head { padding:8px 14px; background:var(--s2); border-bottom:1px solid var(--border); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
.info-row:last-child { border-bottom:none; }
.ir-label { color:var(--muted); } .ir-val { font-weight:600; font-variant-numeric:tabular-nums; color:var(--text); }
.ir-gold { color:#c9960c; } .ir-green { color:#27a357; } .ir-blue { color:#3b82f6; } .ir-purple { color:#a855f7; }
.eco-row { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; }
.eco-row:last-child { border-bottom:none; }
.eco-name { color:var(--muted); } .eco-val { font-weight:600; font-variant-numeric:tabular-nums; }
.dev-item { padding:8px 14px; border-bottom:1px solid rgba(255,255,255,.04); }
.dev-item:last-child { border-bottom:none; }
.dev-name { font-size:13px; color:rgba(255,255,255,.80); }
.dev-stat { font-size:11px; color:#cf4444; margin-top:2px; }
.btn-reset { width:100%; background:transparent; border:1px solid var(--border); color:var(--dim); font-size:12px; padding:9px; border-radius:8px; transition:border-color .15s,color .15s; font-family:inherit; cursor:pointer; }

const THEME_KEY = 'pmSim_theme';
function applyTheme(theme) {
  document.documentElement.classList.toggle('dark', theme === 'dark');
  const icon = document.getElementById('themeIcon');
  if (!icon) return;
  if (theme === 'dark') {
    // Sun icon — click to go light
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    document.getElementById('themeToggle').title = 'Açık moda geç';
  } else {
    // Moon icon — click to go dark
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    document.getElementById('themeToggle').title = 'Koyu moda geç';
  }
}
function toggleTheme() {
  const next = (localStorage.getItem(THEME_KEY) || 'light') === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

const OLD_TO_NEW = { value:'fayda_deger', agile:'kapsam', ethics:'uyumluluk', comms:'catisma', tech:'entegrasyon' };
const DIFF_WEIGHT = { beginner:1, intermediate:3, advanced:5 };
const TAB_DIFF    = { capm:1, pmp:3, adv:5 };
const TAB_LABEL   = { capm:'capm', pmp:'pmp', adv:'adv' };

function statClass(s) {
  if (s >= 17) return 'sv-expert';
  if (s >= 13) return 'sv-proficient';
  if (s >= 8)  return 'sv-competent';
  if (s >= 4)  return 'sv-developing';
  if (s >= 1)  return 'sv-weak';
  return 'sv-none';
}

function careerLevel(xp) {
  if (xp >= 120) return { n:5, t:'Kıdemli PM' };
  if (xp >= 80)  return { n:4, t:'PM Lideri' };
  if (xp >= 50)  return { n:3, t:'Proje Yöneticisi' };
  if (xp >= 20)  return { n:2, t:'Junior PM' };
  return { n:1, t:'PM Stajyeri' };
}

async function loadManifest() {
  if (window.__ENV?.SUPABASE_URL) {
    const storageBase = `${window.__ENV.SUPABASE_URL}/storage/v1/object/public/scenarios`;
    try { const r = await fetch(`${storageBase}/manifest.json?t=${Date.now()}`); if (r.ok) return r.json(); } catch {}
  }
  try { const r = await fetch('data/scenarios/manifest.json'); return r.ok ? r.json() : null; } catch { return null; }
}

async function loadScenario(id) {
  if (window.__ENV?.SUPABASE_URL) {
    const storageBase = `${window.__ENV.SUPABASE_URL}/storage/v1/object/public/scenarios`;
    try { const r = await fetch(`${storageBase}/${id}.json?t=${Date.now()}`); if (r.ok) return r.json(); } catch {}
  }
  try { const r = await fetch(`data/scenarios/${id}.json`); return r.ok ? r.json() : null; } catch { return null; }
}

function _getLocalSaves(username) {
  const prefix = `pmSim_save_${username}_`, saves = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith(prefix)) continue;
    try { const d = JSON.parse(localStorage.getItem(key)); if (d) saves.push({ ...d, scenarioId: key.slice(prefix.length) }); } catch {}
  }
  return saves;
}

async function getUserSaves(username) {
  if (window.__sbFetchUserSaves) {
    try {
      const sbSaves = await window.__sbFetchUserSaves();
      if (sbSaves.length > 0) {
        sbSaves.forEach(save => {
          const key = `pmSim_save_${username}_${save.scenarioId}`;
          const raw = localStorage.getItem(key), local = raw ? JSON.parse(raw) : null;
          if (!local || (save.savedAt && (!local.savedAt || save.savedAt > local.savedAt))) {
            localStorage.setItem(key, JSON.stringify(save));
          }
        });
        return sbSaves;
      }
    } catch (e) { console.warn('[DB] Kayıtlar alınamadı, local\'den devam:', e.message); }
  }
  return _getLocalSaves(username);
}

function buildScenarioMaps(scenario) {
  const decisionMap = {};
  for (const n of (scenario.notifications || [])) {
    if (n.type === 'decision') decisionMap[n.id] = n.options || [];
  }
  const decToComp = {};
  const comps = scenario.competencies || [];
  if (comps.length > 0 && comps[0].components) {
    for (const area of comps) for (const comp of (area.components || [])) for (const did of (comp.decisionIds || [])) decToComp[did] = comp.id;
  } else {
    for (const comp of comps) { const newId = OLD_TO_NEW[comp.id]; if (!newId) continue; for (const did of (comp.decisionIds || [])) decToComp[did] = newId; }
  }
  return { decisionMap, decToComp };
}

function computeStats(saves, scenariosData, diffWeight) {
  const earned = {};
  for (const area of AREAS) for (const sk of area.skills) earned[sk.id] = { e:0, m:0 };
  for (const save of saves) {
    if ((save.difficultyWeight || 3) !== diffWeight) continue;
    const scenario = scenariosData[save.scenarioId]; if (!scenario) continue;
    const { decisionMap, decToComp } = buildScenarioMaps(scenario);
    for (const [didStr, optKey] of Object.entries(save.answered || {})) {
      if (optKey === 'READ') continue;
      const did = parseInt(didStr, 10), compId = decToComp[did];
      if (!compId || !earned[compId]) continue;
      const options = decisionMap[did] || [];
      earned[compId].m += Math.max(0, ...options.map(o => o.xp || 0));
      earned[compId].e += Math.max(0, options.find(o => o.key === optKey)?.xp || 0);
    }
  }
  const stats = {};
  for (const [id, v] of Object.entries(earned)) stats[id] = v.m > 0 ? Math.min(20, Math.round((v.e / v.m) * 20)) : 0;
  return stats;
}

function computeProfile(saves, scenariosData) {
  let totalXP = 0, totalDec = 0, goodDec = 0, scenarios = 0;
  for (const save of saves) {
    totalXP += save.xp || 0;
    const scenario = scenariosData[save.scenarioId];
    const decisionMap = scenario ? buildScenarioMaps(scenario).decisionMap : {};
    const answered = save.answered || {};
    const answeredDecs = Object.entries(answered).filter(([,v]) => v !== 'READ');
    totalDec += answeredDecs.length;
    for (const [didStr, optKey] of answeredDecs) {
      const options = (decisionMap[parseInt(didStr, 10)] || []);
      const chosen = options.find(o => o.key === optKey);
      if (chosen && (chosen.xp || 0) > 0) goodDec++;
    }
    const allDecIds = Object.keys(decisionMap).map(Number);
    if (allDecIds.length > 0 && allDecIds.every(id => answered[id] && answered[id] !== 'READ')) scenarios++;
  }
  return { totalXP, totalDec, goodDec, scenarios };
}

function defaultTab(saves) {
  const weights = new Set(saves.map(s => s.difficultyWeight || 3));
  if (weights.has(5)) return 'adv';
  if (weights.has(3)) return 'pmp';
  return 'capm';
}

function hasDataForTab(saves, tab) { return saves.some(s => (s.difficultyWeight || 3) === TAB_DIFF[tab]); }

function renderAttr(stats, tab) {
  let html = '<div class="attr-panel">', riskShown = false;
  for (const area of AREAS) {
    if (area.type === 'risk' && !riskShown) {
      html += `<div class="risk-section-divider"><span>RİSK YÖNETİMİ YETKİNLİKLERİ</span></div>`;
      riskShown = true;
    }
    html += `<div class="area-block"><div class="area-head"><span class="area-head-name">${area.label}</span>${area.weight != null ? `<span class="area-head-weight">%${area.weight}</span>` : ''}</div>`;
    const skills = area.skills;
    for (let i = 0; i < skills.length; i += 2) {
      const s1 = skills[i], s2 = skills[i+1];
      const st1 = stats[s1.id] || 0;
      const lbl1 = s1.oldLabel ? `${s1.label} <span class="skill-old">(${s1.oldLabel})</span>` : s1.label;
      html += `<div class="skill-pair"><div class="skill-cell${!s2?' sk-solo':''}" title="${s1.desc[tab]||''}"><span class="skill-label">${lbl1}</span><span class="skill-num ${statClass(st1)}">${st1||'—'}</span></div>`;
      if (s2) {
        const st2 = stats[s2.id] || 0;
        const lbl2 = s2.oldLabel ? `${s2.label} <span class="skill-old">(${s2.oldLabel})</span>` : s2.label;
        html += `<div class="skill-cell" title="${s2.desc[tab]||''}"><span class="skill-label">${lbl2}</span><span class="skill-num ${statClass(st2)}">${st2||'—'}</span></div>`;
      }
      html += `</div>`;
    }
    html += '</div>';
  }
  return html + '</div>';
}

function renderRight(profile, stats, saves, tab, scenariosData) {
  const lvl = careerLevel(profile.totalXP);
  const acc = profile.totalDec > 0 ? Math.round(profile.goodDec / profile.totalDec * 100) + '%' : '—';
  const tabColor = tab==='capm'?'ir-gold':tab==='pmp'?'ir-blue':'ir-purple';
  const tabName  = tab==='capm'?'Temel':tab==='pmp'?'Profesyonel':'Uzman';
  const col = tab==='capm'?'#c9960c':tab==='pmp'?'#3b82f6':'#a855f7';

  let ecoHTML = `<div class="info-panel"><div class="panel-head">Alan Performansı · ${tabName}</div>`;
  for (const area of AREAS.filter(a => a.type !== 'risk')) {
    const compStats = area.skills.map(sk => stats[sk.id]||0).filter(v=>v>0);
    const avg = compStats.length > 0 ? Math.round(compStats.reduce((a,b)=>a+b,0)/compStats.length) : 0;
    ecoHTML += `<div class="eco-row"><span class="eco-name">${area.label.split('/')[0].trim()}</span><span class="eco-val" style="color:${avg>0?col:'var(--dim)'}">${avg>0?Math.round((avg/20)*100)+'%':'—'}</span></div>`;
  }
  ecoHTML += '</div>';

  const weak = [];
  for (const area of AREAS) for (const sk of area.skills) { const st = stats[sk.id]||0; if (st >= 1 && st < 4) weak.push({ label:sk.label, stat:st }); }
  const devHTML = weak.length > 0 ? `<div class="info-panel"><div class="panel-head">Gelişim Alanları</div>${weak.map(sk=>`<div class="dev-item"><div class="dev-name">${sk.label}</div><div class="dev-stat">${sk.stat} / 20 · Temel</div></div>`).join('')}</div>` : '';

  const statsHTML = `<div class="info-panel"><div class="panel-head">Kariyer İstatistikleri</div>
    <div class="info-row"><span class="ir-label">Toplam XP</span><span class="ir-val ir-gold">${profile.totalXP}</span></div>
    <div class="info-row"><span class="ir-label">Kariyer Seviyesi</span><span class="ir-val ir-gold">Seviye ${lvl.n} · ${lvl.t}</span></div>
    <div class="info-row"><span class="ir-label">Tamamlanan Senaryo</span><span class="ir-val">${profile.scenarios}</span></div>
    <div class="info-row"><span class="ir-label">Verilen Karar</span><span class="ir-val">${profile.totalDec}</span></div>
    <div class="info-row"><span class="ir-label">İsabetli Karar</span><span class="ir-val ir-green">${acc}</span></div>
    <div class="info-row"><span class="ir-label">Aktif Seviye</span><span class="ir-val ${tabColor}">${tabName}</span></div>
  </div>`;

  return `${statsHTML}${ecoHTML}${devHTML}<button class="btn-reset" onclick="confirmReset()">Tüm Kayıtları Sıfırla</button>`;
}

let G = { saves:[], scenariosData:{}, activeTab:'capm', profile:null };

async function init() {
  const sess = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch { return null; } })();

  const manifest = await loadManifest();
  if (manifest) {
    const ids = manifest.scenarios.map(s => s.id);
    const loaded = await Promise.all(ids.map(id => loadScenario(id)));
    ids.forEach((id,i) => { if (loaded[i]) G.scenariosData[id] = loaded[i]; });
  }

  if (sess?.username) G.saves = await getUserSaves(sess.username);

  const profile = computeProfile(G.saves, G.scenariosData);
  const lvl = careerLevel(profile.totalXP);
  const acc = profile.totalDec > 0 ? Math.round(profile.goodDec/profile.totalDec*100)+'%' : '—';

  // Show career stats in hero
  const statsEl = document.getElementById('profileCareerStats');
  if (statsEl) {
    statsEl.style.display = '';
    document.getElementById('sc-scenarios').textContent  = profile.scenarios;
    document.getElementById('sc-decisions').textContent  = profile.totalDec;
    document.getElementById('sc-accuracy').textContent   = acc;
    document.getElementById('sc-xp').textContent         = profile.totalXP + ' XP';
    document.getElementById('sc-level-title').textContent = 'Seviye ' + lvl.n + ' · ' + lvl.t;
  }

  G.activeTab = defaultTab(G.saves);
  G.profile   = profile;
  setupTabs();
  renderTab(G.activeTab);
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const tab = btn.dataset.tab;
    if (!hasDataForTab(G.saves, tab)) {
      btn.style.opacity = '0.65';
      const sub = btn.querySelector('.tab-sub');
      if (sub) sub.textContent = 'Veri yok · ' + sub.textContent.split('·')[1]?.trim();
    }
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      G.activeTab = tab;
      renderTab(tab);
    });
  });
  document.querySelector(`.tab-btn[data-tab="${G.activeTab}"]`)?.classList.add('active');
}

function renderTab(tab) {
  const diffWeight = TAB_DIFF[tab];
  const stats   = computeStats(G.saves, G.scenariosData, diffWeight);
  const hasData = hasDataForTab(G.saves, tab);
  const tabKey  = TAB_LABEL[tab];
  const attrHTML  = renderAttr(stats, tabKey);
  const rightHTML = renderRight(G.profile, stats, G.saves, tab, G.scenariosData);
  const emptyHTML = !hasData ? `<div class="empty-note"><h3>Bu düzeyde veri yok</h3><p>${tab==='capm'?'Kolay':tab==='pmp'?'Normal':'Zor'} zorluktaki senaryoyu simüle ederek bu düzeyi doldur.</p><a href="game.html" class="btn-play">Simülasyonu Başlat</a></div>` : '';
  document.getElementById('main-grid').innerHTML = `<div>${attrHTML}${emptyHTML}</div><div class="right-panel">${rightHTML}</div>`;
}

async function confirmReset() {
  if (!confirm('Kariyer istatistiklerini sıfırlamak istediğinden emin misin?\n\nMevcut puanlar gizlenir; geçmiş kayıtlar silinmez, güvenle saklanır.')) return;
  const sess = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch { return null; } })();
  if (sess?.username) {
    const prefix = `pmSim_save_${sess.username}_`, archive = `pmSim_archive_${sess.username}_`;
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k?.startsWith(prefix)) keys.push(k); }
    keys.forEach(k => { localStorage.setItem(archive + k.slice(prefix.length), localStorage.getItem(k)); localStorage.removeItem(k); });
  }
  localStorage.removeItem('pmp_career_competency');
  if (window.__sbArchiveSaves) { try { await window.__sbArchiveSaves(); } catch (e) { console.warn('[DB] Arşiv başarısız:', e.message); } }
  location.reload();
}

function getEcoHistory() {
  try { return JSON.parse(localStorage.getItem('yetkinlider_eco_history') || '{}'); } catch { return {}; }
}
function computeDomainScore(outcomes) {
  if (!Array.isArray(outcomes) || outcomes.length < 10) return null;
  const win = outcomes.length >= 100 ? outcomes.slice(-50) : outcomes.slice(-10);
  return Math.round(win.reduce((a, b) => a + b, 0) / win.length * 100);
}

const DOMAINS = [
  { key: 'people',   label: 'İnsan',     sub: 'Liderlik, çatışma, motivasyon',   icon: '👥', cls: 'people'   },

function scoreClass(s) {
  if (s === null) return 'no-data';
  if (s >= 80) return 'green';
  if (s >= 50) return 'amber';
  return 'red';
}

function renderDomains() {
  const hist = getEcoHistory();
  const grid = document.getElementById('domainGrid');

    const outcomes = hist[d.key] || [];
    const score    = computeDomainScore(outcomes);
    const cls      = scoreClass(score);

    const scoreText = score !== null ? score + '%' : (outcomes.length > 0 ? outcomes.length + '/10' : '—');
    const countText = outcomes.length > 0
      ? outcomes.length + ' karar' + (score !== null ? (outcomes.length >= 100 ? ' · son 50 karardan' : ' · son 10 karardan') : ' · henüz 10 karar bekleniyor')

    return `<div class="domain-card">

    <div><div class="dc-name">${d.label}</div><div class="dc-sub">${d.sub}</div></div>

  <div class="dc-score ${cls}">${scoreText}</div>
  <div class="dc-bar-wrap"><div class="dc-bar ${cls}" style="width:${barW}%"></div></div>

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // Resize to max 256px to keep localStorage small
    const img = new Image();
    img.onload = function() {
      const MAX = 256;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      localStorage.setItem('pmSim_profile_photo', dataUrl);
      renderProfile();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── PROFILE HERO ─────────────────────────────────────────────────────────────
function renderProfile() {
  if (!session) return;
  const photo = localStorage.getItem('pmSim_profile_photo');
  const avEl  = document.getElementById('profileAv');
  if (photo) {
    avEl.innerHTML = '<img src="' + photo + '" alt="">';
  } else {
    avEl.textContent = (session.displayName || session.username || '?')[0].toUpperCase();
  }
  document.getElementById('profileName').textContent     = session.displayName || session.username;
  document.getElementById('profileUsername').textContent = '@' + session.username;
  document.getElementById('profileEmail').textContent    = session.email || '';

  const ROLE_CFG = {
    admin:    { label: 'Admin',    cls: 'admin' },
    editor:   { label: 'Editör',  cls: 'editor' },
    premium:  { label: 'Premium', cls: 'premium' },
    trial:    { label: 'Deneme',  cls: 'trial' },
  };
  const meta = [];
  const roleCfg = ROLE_CFG[session.role] || { label: 'Standart', cls: 'standard' };
  meta.push('<span class="profile-badge ' + roleCfg.cls + '">' + roleCfg.label + '</span>');
  if (session.createdAt) {
    const d = new Date(session.createdAt);
    meta.push('<span class="profile-badge">Üye: ' + d.toLocaleDateString('tr-TR', {year:'numeric',month:'long'}) + '</span>');
  }
  if (session.devMode) {
    meta.push('<span class="profile-badge dev">Dev Modu</span>');
  }
  document.getElementById('profileMeta').innerHTML = meta.join('');
}

// ── EDIT NAME ────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('editNameInput').value = session.displayName || '';
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editNameInput').focus(), 50);
}
function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}
function saveName() {
  const val = document.getElementById('editNameInput').value.trim();
  if (!val) return;
  session.displayName = val;
  setSession(session);
  // Also update in users array
  try {
    const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    const idx   = users.findIndex(u => u.username === session.username);
    if (idx >= 0) { users[idx].displayName = val; localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
  } catch {}
  closeModal();
  renderProfile();
  renderAccount();
  // Update navbar
  document.getElementById('navUser').querySelector('.nav-username').textContent = val;
}
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeModal();
});
document.getElementById('editNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
  if (e.key === 'Escape') closeModal();
});

// ── WORK META (company + sector) ─────────────────────────────────────────────
function getWorkMeta() {
  try { return JSON.parse(localStorage.getItem('pmSim_work_meta') || '{}'); } catch { return {}; }
}
function openWorkModal() {
  const meta = getWorkMeta();
  document.getElementById('editCompanyInput').value   = meta.company   || '';
  document.getElementById('editSectorInput').value    = meta.sector    || '';
  document.getElementById('editGenderInput').value    = meta.gender    || '';
  document.getElementById('editBirthdateInput').value = meta.birthdate || '';
  document.getElementById('editWorkModal').classList.add('open');
  setTimeout(() => document.getElementById('editCompanyInput').focus(), 50);
}
function closeWorkModal() {
  document.getElementById('editWorkModal').classList.remove('open');
}
function saveWork() {
  const company   = document.getElementById('editCompanyInput').value.trim();
  const sector    = document.getElementById('editSectorInput').value;
  const gender    = document.getElementById('editGenderInput').value;
  const birthdate = document.getElementById('editBirthdateInput').value;
  localStorage.setItem('pmSim_work_meta', JSON.stringify({ company, sector, gender, birthdate }));
  closeWorkModal();
  renderAccount();
}
document.getElementById('editWorkModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editWorkModal')) closeWorkModal();
});

// ── LOGOUT ───────────────────────────────────────────────────────────────────
function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  location.href = 'index.html';
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.profile-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
}

renderProfile();

renderAccount();
